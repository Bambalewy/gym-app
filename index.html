function uid() { return Math.random().toString(36).slice(2, 10); }
function round(n) { return Math.round(n * 2) / 2; }
function todayISO() { return new Date().toISOString().slice(0, 10); }
function fmtDate(iso) {
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("it-IT", { day: "2-digit", month: "2-digit", year: "numeric" });
}
function fmtDateTime(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  const sameDay = d.toDateString() === new Date().toDateString();
  const time = d.toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
  return sameDay ? `oggi alle ${time}` : `${d.toLocaleDateString("it-IT", { day: "2-digit", month: "2-digit" })} alle ${time}`;
}

function computeSuggestion(exercise, sessions, phase) {
  if (exercise.type !== "weight") {
    return { text: "Confronta con l'ultima volta e prova a migliorare leggermente (peso, ripetizioni o tempo).", weight: null, reps: null };
  }
  const range = phase === "massa" ? exercise.rangeMassa : exercise.rangeForza;
  const history = sessions
    .filter((s) => s.entries.some((e) => e.exerciseId === exercise.id))
    .sort((a, b) => new Date(b.date) - new Date(a.date));

  if (history.length === 0) {
    return { text: `Prima volta: scegli un peso con cui arrivi a ${range[0]}-${range[1]} ripetizioni per ${exercise.defaultSets || 3} serie.`, weight: null, reps: range[0], sets: exercise.defaultSets || 3 };
  }
  const last = history[0].entries.find((e) => e.exerciseId === exercise.id);
  const workingWeight = Math.max(...last.sets.map((s) => s.weight));
  const setsAtWeight = last.sets.filter((s) => s.weight === workingWeight);
  const allTop = setsAtWeight.length > 0 && setsAtWeight.every((s) => s.reps >= range[1]);

  if (last.flag) {
    return { text: `L'ultima volta avevi segnalato fastidio/infortunio. Riparti con cautela: stesso peso (${workingWeight}${exercise.unit}), punta a ${range[0]} reps.`, weight: workingWeight, reps: range[0], sets: last.sets.length };
  }
  if (allTop) {
    const newWeight = round(workingWeight + exercise.increment);
    return { text: `Hai raggiunto il top del range (${range[1]} reps): sali a ${newWeight}${exercise.unit} e riparti da ${range[0]} reps.`, weight: newWeight, reps: range[0], sets: last.sets.length };
  }
  const second = history[1] && history[1].entries.find((e) => e.exerciseId === exercise.id);
  if (second) {
    const secondWeight = Math.max(...second.sets.map((s) => s.weight));
    const secondSetsAtWeight = second.sets.filter((s) => s.weight === secondWeight);
    const lastTotal = setsAtWeight.reduce((a, s) => a + s.reps, 0);
    const secondTotal = secondSetsAtWeight.reduce((a, s) => a + s.reps, 0);
    if (secondWeight === workingWeight && lastTotal <= secondTotal) {
      const deloadWeight = round(workingWeight * 0.9);
      return { text: `Nessun progresso nelle ultime 2 sessioni a ${workingWeight}${exercise.unit}: scarico a ${deloadWeight}${exercise.unit}.`, weight: deloadWeight, reps: range[0], sets: last.sets.length };
    }
  }
  const maxRepsLast = Math.max(...setsAtWeight.map((s) => s.reps));
  const targetReps = Math.min(maxRepsLast + 1, range[1]);
  return { text: `Resta a ${workingWeight}${exercise.unit}: prova ad arrivare a ${targetReps} reps (range ${range[0]}-${range[1]}).`, weight: workingWeight, reps: targetReps, sets: last.sets.length };
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(LOCAL_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return { phase: "massa", exercises: DEFAULT_EXERCISES, sessions: DEFAULT_SESSIONS, updatedAt: 0 };
}
function saveLocal(data) {
  try { localStorage.setItem(LOCAL_KEY, JSON.stringify(data)); } catch (e) {}
}

/* =========================================================
   GOOGLE DRIVE SYNC (cartella nascosta appDataFolder)
   ========================================================= */
let tokenClient = null;
let currentToken = null;

function ensureTokenClient(onToken) {
  if (tokenClient || !window.google) return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: (resp) => {
      if (resp && resp.access_token) {
        currentToken = resp.access_token;
        onToken(resp.access_token);
      }
    },
  });
}

function requestSignIn() {
  if (tokenClient) tokenClient.requestAccessToken({ prompt: "consent" });
}
function requestSilentToken() {
  if (tokenClient) tokenClient.requestAccessToken({ prompt: "" });
}

async function driveFindFileId(token) {
  const q = encodeURIComponent(`name='${DRIVE_FILENAME}'`);
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=${q}&fields=files(id,name)`, {
    headers: { Authorization: `Bearer ${token}` },
  });
  if (!res.ok) throw new Error("drive list failed");
  const json = await res.json();
  return (json.files && json.files[0]) ? json.files[0].id : null;
}

async function driveCreateFile(token, contentStr) {
  const metadata = { name: DRIVE_FILENAME, parents: ["appDataFolder"] };
  const boundary = "gymapp_boundary_xyz";
  const body =
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${contentStr}\r\n--${boundary}--`;
  const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id", {
    method: "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": `multipart/related; boundary=${boundary}` },
    body,
  });
  if (!res.ok) throw new Error("drive create failed");
  const json = await res.json();
  return json.id;
}

async function driveUpdateFile(token, fileId, contentStr) {
  const res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
    method: "PATCH",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: contentStr,
  });
  if (!res.ok) throw new Error("drive update failed");
}

async function driveGetContent(token, fileId) {
  const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
    headers: { Authorization: `Bearer ${token}` },
  });
  if (!res.ok) throw new Error("drive get failed");
  return await res.text();
}

function GymAgent() {
  const [data, setData] = useState(() => loadLocal());
  const [tab, setTab] = useState("log");
  const [confirmReset, setConfirmReset] = useState(false);
  const [historyFilter, setHistoryFilter] = useState("");
  const [expandedSession, setExpandedSession] = useState(null);
  const [expandedExercise, setExpandedExercise] = useState(null);
  const [sessionDate, setSessionDate] = useState(todayISO());
  const [pickerOpen, setPickerOpen] = useState(false);
  const [today, setToday] = useState({});

  const [signedIn, setSignedIn] = useState(false);
  const [syncStatus, setSyncStatus] = useState("offline"); // offline | syncing | synced | error
  const [driveFileId, setDriveFileId] = useState(null);
  const [exportText, setExportText] = useState(null);
  const [importText, setImportText] = useState("");
  const [showImport, setShowImport] = useState(false);
  const [importMsg, setImportMsg] = useState(null);

  const dataRef = useRef(data);
  dataRef.current = data;

  /* --- init Google auth appena lo script GIS è pronto --- */
  useEffect(() => {
    const interval = setInterval(() => {
      if (window.google && window.google.accounts) {
        ensureTokenClient(handleNewToken);
        requestSilentToken(); // tenta login silenzioso se già autorizzato prima
        clearInterval(interval);
      }
    }, 300);
    return () => clearInterval(interval);
  }, []);

  async function handleNewToken(token) {
    setSignedIn(true);
    setSyncStatus("syncing");
    try {
      let fileId = driveFileId || await driveFindFileId(token);
      if (!fileId) {
        fileId = await driveCreateFile(token, JSON.stringify(dataRef.current));
        setDriveFileId(fileId);
        setSyncStatus("synced");
        return;
      }
      setDriveFileId(fileId);
      const remoteStr = await driveGetContent(token, fileId);
      const remote = JSON.parse(remoteStr);
      const local = dataRef.current;
      // last-write-wins in base a updatedAt
      if ((remote.updatedAt || 0) > (local.updatedAt || 0)) {
        setData(remote);
        saveLocal(remote);
      } else if ((local.updatedAt || 0) > (remote.updatedAt || 0)) {
        await driveUpdateFile(token, fileId, JSON.stringify(local));
      }
      setSyncStatus("synced");
    } catch (e) {
      setSyncStatus("error");
    }
  }

  function persist(next) {
    const stamped = { ...next, updatedAt: Date.now() };
    setData(stamped);
    saveLocal(stamped);
    if (currentToken && driveFileId) {
      setSyncStatus("syncing");
      driveUpdateFile(currentToken, driveFileId, JSON.stringify(stamped))
        .then(() => setSyncStatus("synced"))
        .catch(() => setSyncStatus("error"));
    } else if (signedIn) {
      // token forse scaduto, prova refresh silenzioso
      requestSilentToken();
    }
  }

  const sortedSessions = [...data.sessions].sort((a, b) => new Date(b.date) - new Date(a.date));
  const exercisesById = Object.fromEntries(data.exercises.map((e) => [e.id, e]));

  const exerciseHistoryRows = useMemo(() => {
    if (!historyFilter) return [];
    return sortedSessions
      .filter((s) => s.entries.some((e) => e.exerciseId === historyFilter))
      .map((s) => ({ date: s.date, entry: s.entries.find((e) => e.exerciseId === historyFilter) }));
  }, [historyFilter, data]);

  function getExerciseHistoryRows(exerciseId) {
    return sortedSessions
      .filter((s) => s.entries.some((e) => e.exerciseId === exerciseId))
      .map((s) => ({ date: s.date, entry: s.entries.find((e) => e.exerciseId === exerciseId) }));
  }

  function deleteSession(sessionId) {
    persist({ ...data, sessions: data.sessions.filter((s) => s.id !== sessionId) });
  }

  function editSession(session) {
    const newToday = {};
    session.entries.forEach((entry) => {
      const ex = exercisesById[entry.exerciseId];
      if (!ex) return;
      const remaining = data.sessions.filter((s) => s.id !== session.id);
      const sug = computeSuggestion(ex, remaining, data.phase);
      if (ex.type === "weight") {
        newToday[entry.exerciseId] = {
          sets: entry.sets.map((s) => ({ weight: String(s.weight), reps: String(s.reps) })),
          flag: entry.flag, suggestion: sug,
        };
      } else {
        newToday[entry.exerciseId] = { note: entry.note || "", flag: entry.flag, suggestion: sug };
      }
    });
    setToday(newToday);
    setSessionDate(session.date);
    deleteSession(session.id);
    setTab("log");
  }

  function importFromText() {
    setImportMsg(null);
    try {
      const parsed = JSON.parse(importText.trim());
      if (!parsed || !Array.isArray(parsed.sessions) || !Array.isArray(parsed.exercises)) {
        setImportMsg("Formato non valido.");
        return;
      }
      persist(parsed);
      setImportMsg("Importazione riuscita: " + parsed.sessions.length + " sessioni caricate.");
      setImportText("");
      setShowImport(false);
    } catch (e) {
      setImportMsg("Testo non riconosciuto.");
    }
  }

  function addExerciseToToday(ex) {
    const sug = computeSuggestion(ex, data.sessions, data.phase);
    const nSets = sug.sets || ex.defaultSets || 3;
    setToday((t) => ({
      ...t,
      [ex.id]: ex.type === "weight"
        ? { sets: Array.from({ length: nSets }, () => ({ weight: sug.weight ?? "", reps: sug.reps ?? "" })), flag: false, suggestion: sug }
        : { note: "", flag: false, suggestion: sug },
    }));
    setPickerOpen(false);
  }

  function removeExerciseFromToday(id) {
    setToday((t) => { const n = { ...t }; delete n[id]; return n; });
  }
  function updateSet(exId, idx, field, val) {
    setToday((t) => {
      const entry = { ...t[exId] };
      const sets = entry.sets.slice();
      sets[idx] = { ...sets[idx], [field]: val };
      entry.sets = sets;
      return { ...t, [exId]: entry };
    });
  }
  function addSetRow(exId) {
    setToday((t) => { const entry = { ...t[exId] }; entry.sets = [...entry.sets, { weight: "", reps: "" }]; return { ...t, [exId]: entry }; });
  }
  function removeSetRow(exId, idx) {
    setToday((t) => { const entry = { ...t[exId] }; entry.sets = entry.sets.filter((_, i) => i !== idx); return { ...t, [exId]: entry }; });
  }
  function toggleFlag(exId) {
    setToday((t) => ({ ...t, [exId]: { ...t[exId], flag: !t[exId].flag } }));
  }
  function updateNote(exId, val) {
    setToday((t) => ({ ...t, [exId]: { ...t[exId], note: val } }));
  }

  function saveSession() {
    const ids = Object.keys(today);
    if (ids.length === 0) return;
    const entries = ids.map((exId) => {
      const ex = exercisesById[exId];
      const entry = today[exId];
      if (ex.type === "weight") {
        return {
          exerciseId: exId, flag: entry.flag,
          sets: entry.sets.filter((s) => s.weight !== "" && s.reps !== "")
            .map((s) => ({ weight: parseFloat(s.weight), reps: parseInt(s.reps, 10) })),
        };
      }
      return { exerciseId: exId, flag: entry.flag, note: entry.note };
    });
    const session = { id: uid(), date: sessionDate, entries };
    persist({ ...data, sessions: [...data.sessions, session] });
    setToday({});
    setSessionDate(todayISO());
    setTab("history");
  }

  const groupedLibrary = CATEGORIES.map((cat) => ({ cat, items: data.exercises.filter((e) => e.category === cat) }));

    offline: "non collegato a Google",

    synced: "sincronizzato con Drive",

  }[syncStatus];
  const syncColor = { offline: "#9a978c", syncing: "#D6E24B", synced: "#7FBF7F", error: "#E2572B" }[syncStatus];

  return (
    <div style={{ fontFamily: "system-ui, sans-serif", background: "#121210", color: "#EDEAE0", minHeight: "100vh", padding: "0 0 40px 0" }}>

              <select className="ga-input" style={{ width: 260, display: "inline-block" }} value={historyFilter} onChange={(e) => setHistoryFilter(e.target.value)}>
                <option value="">-- tutte le sessioni --</option>
                {data.exercises.filter((e) => e.type === "weight").map((e) => <option key={e.id} value={e.id}>{e.name}</option>)}
              </select>
            </div>
            {historyFilter ? (
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead><tr style={{ color: "#9a978c", textAlign: "left", borderBottom: "1px solid #26241f" }}>
                  <th style={{ padding: "6px 4px" }}>Data</th><th style={{ padding: "6px 4px" }}>Serie</th><th></th>
                </tr></thead>
                <tbody>
                  {exerciseHistoryRows.map((r, i) => (
                    <tr key={i} style={{ borderBottom: "1px solid #1c1c19" }}>
                      <td style={{ padding: "6px 4px" }} className="ga-mono">{fmtDate(r.date)}</td>
                      <td style={{ padding: "6px 4px" }} className="ga-mono">{r.entry.sets.map((s) => `${s.weight}x${s.reps}`).join(" / ")}</td>
                      <td>{r.entry.flag && "⚠️"}</td>
                    </tr>
                  ))}
                  {exerciseHistoryRows.length === 0 && <tr><td colSpan={3} style={{ padding: 12, color: "#9a978c" }}>Nessuno storico per questo esercizio.</td></tr>}
                </tbody>
              </table>
            ) : (
              <div>
                {sortedSessions.length === 0 && <div style={{ color: "#9a978c" }}>Ancora nessun allenamento registrato.</div>}
                {sortedSessions.map((s) => (
                  <div key={s.id} style={{ marginBottom: 8, border: "1px solid #26241f", borderRadius: 8, overflow: "hidden" }}>
                    <div onClick={() => setExpandedSession(expandedSession === s.id ? null : s.id)} style={{ padding: "10px 14px", background: "#1c1c19", cursor: "pointer", display: "flex", justifyContent: "space-between" }}>
                      <span className="ga-mono">{fmtDate(s.date)}</span>
                      <span style={{ fontSize: 12, color: "#9a978c" }}>{s.entries.length} esercizi {expandedSession === s.id ? "▲" : "▼"}</span>
                    </div>
                    {expandedSession === s.id && (
                      <div style={{ padding: "10px 14px" }}>
                        {s.entries.map((e, i) => {
                          const ex = exercisesById[e.exerciseId];
                          return (
                            <div key={i} style={{ fontSize: 13, marginBottom: 6, display: "flex", justifyContent: "space-between" }}>
                              <span>{ex ? ex.name : e.exerciseId} {e.flag && "⚠️"}</span>
                              <span className="ga-mono" style={{ color: "#9a978c" }}>{ex && ex.type === "weight" ? e.sets.map((s2) => `${s2.weight}x${s2.reps}`).join(" / ") : e.note}</span>
                            </div>
                          );
                        })}
                        <div style={{ display: "flex", gap: 8, marginTop: 10, paddingTop: 10, borderTop: "1px solid #26241f" }}>
                          <button className="ga-btn" style={{ fontSize: 12, padding: "5px 10px" }} onClick={() => editSession(s)}>Modifica</button>
                          <button className="ga-btn" style={{ fontSize: 12, padding: "5px 10px", borderColor: "#E2572B", color: "#E2572B" }} onClick={() => deleteSession(s.id)}>🗑 Elimina</button>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {tab === "library" && (
          <div>
            {groupedLibrary.map((g) => (
              <div key={g.cat} style={{ marginBottom: 18 }}>
                <div style={{ fontSize: 12, textTransform: "uppercase", color: "#9a978c", marginBottom: 8 }}>{g.cat}</div>
                {g.items.map((ex) => {
                  const isOpen = expandedExercise === ex.id;
                  const rows = isOpen ? getExerciseHistoryRows(ex.id) : [];
                  return (
                    <div key={ex.id} style={{ borderBottom: "1px solid #1c1c19" }}>
                      <div onClick={() => setExpandedExercise(isOpen ? null : ex.id)} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", fontSize: 13, cursor: "pointer" }}>
                        <span>{ex.name}</span>
                        <span className="ga-mono" style={{ color: "#9a978c" }}>
                          {ex.type === "weight" ? `+${ex.increment}${ex.unit} · massa ${ex.rangeMassa[0]}-${ex.rangeMassa[1]} · forza ${ex.rangeForza[0]}-${ex.rangeForza[1]}` : "libero"} {isOpen ? "▲" : "▼"}
                        </span>
                      </div>
                      {isOpen && (
                        <div style={{ padding: "4px 0 12px 0" }}>
                          {rows.length === 0 ? <div style={{ fontSize: 12, color: "#9a978c" }}>Nessuno storico.</div> : (
                            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                              <tbody>
                                {rows.map((r, i) => (
                                  <tr key={i} style={{ borderTop: "1px solid #26241f" }}>
                                    <td style={{ padding: "4px 4px" }} className="ga-mono">{fmtDate(r.date)}</td>
                                    <td style={{ padding: "4px 4px" }} className="ga-mono">{ex.type === "weight" ? r.entry.sets.map((s) => `${s.weight}x${s.reps}`).join(" / ") : r.entry.note}</td>
                                    <td>{r.entry.flag && "⚠️"}</td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        )}

        {tab === "settings" && (
          <div>
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 13, color: "#9a978c", marginBottom: 8 }}>Sincronizzazione Google Drive</div>
              {!signedIn ? (
                <button className="ga-btn ga-btn-accent" onClick={requestSignIn}>🔐 Accedi con Google</button>
              ) : (
                <div style={{ fontSize: 13, color: syncColor }}>● {syncLabel}</div>
              )}
              <div style={{ fontSize: 12, color: "#9a978c", marginTop: 6 }}>
                I dati vengono salvati in una cartella riservata all'app nel tuo Google Drive, non visibile tra i tuoi file normali. Accedendo con lo stesso account da un altro dispositivo, i dati si sincronizzano automaticamente.
              </div>
            </div>

            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 13, color: "#9a978c", marginBottom: 8 }}>Backup manuale (paracadute extra)</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                <button className="ga-btn" onClick={() => { setExportText(JSON.stringify(data)); setShowImport(false); }}>Esporta dati</button>
                <button className="ga-btn" onClick={() => { setShowImport(true); setExportText(null); setImportMsg(null); }}>Importa dati</button>
              </div>
              {exportText && (
                <div style={{ marginTop: 10 }}>
                  <textarea className="ga-input" readOnly value={exportText} rows={5} style={{ fontSize: 11 }} onFocus={(e) => e.target.select()} />
                </div>
              )}
              {showImport && (
                <div style={{ marginTop: 10 }}>
                  <textarea className="ga-input" placeholder="Incolla qui il testo esportato" value={importText} onChange={(e) => setImportText(e.target.value)} rows={5} style={{ fontSize: 11 }} />
                  <div style={{ marginTop: 6, fontSize: 12, color: "#E2572B" }}>Attenzione: sostituisce tutti i dati.</div>
                  <button className="ga-btn ga-btn-accent" style={{ marginTop: 8 }} onClick={importFromText}>Conferma importazione</button>
                </div>
              )}
              {importMsg && <div style={{ marginTop: 8, fontSize: 12 }}>{importMsg}</div>}
            </div>

            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 13, color: "#9a978c", marginBottom: 8 }}>Fase di programmazione</div>
              <div style={{ display: "flex", gap: 8 }}>
                <button className={`ga-btn ${data.phase === "massa" ? "ga-btn-accent" : ""}`} onClick={() => persist({ ...data, phase: "massa" })}>🔥 Massa (8-12 reps)</button>
                <button className={`ga-btn ${data.phase === "forza" ? "ga-btn-accent" : ""}`} onClick={() => persist({ ...data, phase: "forza" })}>🔥 Forza (4-6 reps)</button>
              </div>
            </div>

            <div>
              <div style={{ fontSize: 13, color: "#9a978c", marginBottom: 8 }}>Dati</div>
              {!confirmReset ? (
                <button className="ga-btn" onClick={() => setConfirmReset(true)}>🗑 Cancella tutti i dati</button>
              ) : (
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <span style={{ fontSize: 13, color: "#E2572B" }}>Sicuro? Non si può annullare.</span>
                  <button className="ga-btn" style={{ borderColor: "#E2572B", color: "#E2572B" }} onClick={() => { persist({ phase: "massa", exercises: DEFAULT_EXERCISES, sessions: [] }); setConfirmReset(false); }}>Conferma</button>
                  <button className="ga-btn" onClick={() => setConfirmReset(false)}>Annulla</button>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<GymAgent />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
